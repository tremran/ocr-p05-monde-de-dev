<div class="register-page">
  <header class="desktop-navbar" aria-hidden="true">
    <img class="desktop-logo" src="/assets/logo_p6.png" alt="" />
  </header>

  <div class="register-content">
    <a class="back-link" routerLink="/" aria-label="Retour a l'accueil">
      <span aria-hidden="true">&#8592;</span>
    </a>

    <img class="register-logo mobile-logo" src="/assets/logo_p6.png" alt="Logo MDD" />
    <h1>Inscription</h1>

    <form [formGroup]="registerForm" (ngSubmit)="submit()" novalidate>
      <label for="name">Nom d'utilisateur</label>
      <input id="name" type="text" formControlName="name" />
      <p class="error" *ngIf="registerForm.controls.name.touched && registerForm.controls.name.invalid">
        Le nom est requis (3 caracteres minimum).
      </p>

      <label for="email">Adresse e-mail</label>
      <input id="email" type="email" formControlName="email" />
      <p class="error" *ngIf="registerForm.controls.email.touched && registerForm.controls.email.invalid">
        Une adresse e-mail valide est requise.
      </p>

      <label for="password">Mot de passe
        <details class="password-help">
          <summary aria-label="Afficher les règles du mot de passe">
            <span class="info-icon" aria-hidden="true">i</span>
            <span class="sr-only">Afficher les règles du mot de passe</span>
          </summary>
          <p class="password-help-text">
            Le mot de passe doit contenir plus de 8 caractères, avec au moins un chiffre, une minuscule,
            une majuscule et un caractère spécial parmi =+_-$#!?.
          </p>
        </details>
      </label>
      <input id="password" type="password" formControlName="password" />
      <p class="error" *ngIf="registerForm.controls.password.touched && registerForm.controls.password.invalid">
        Le format du mot de passe est invalide.
      </p>

      <app-button class="register-submit" type="submit" [disabled]="loading">
        {{ loading ? 'Inscription...' : "S'inscrire" }}
      </app-button>
    </form>

    <p class="feedback success" *ngIf="successMessage">{{ successMessage }}</p>
    <p class="feedback error" *ngIf="errorMessage">{{ errorMessage }}</p>
  </div>
</div>
