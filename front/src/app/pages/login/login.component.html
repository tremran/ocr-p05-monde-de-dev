<div class="login-page">
  <header class="desktop-navbar" aria-hidden="true">
    <img class="desktop-logo" src="/assets/logo_p6.png" alt="" />
  </header>

  <div class="login-content">
    <a class="back-link" routerLink="/" aria-label="Retour a l'accueil">
      <span aria-hidden="true">&#8592;</span>
    </a>

    <img class="login-logo mobile-logo" src="/assets/logo_p6.png" alt="Logo MDD" />
    <h1>Connexion</h1>

    <form [formGroup]="loginForm" (ngSubmit)="submit()" novalidate>
      <label for="email">Adresse e-mail</label>
      <input id="email" type="email" formControlName="email" />
      <p class="error" *ngIf="loginForm.controls.email.touched && loginForm.controls.email.invalid">
        Une adresse e-mail valide est requise.
      </p>

      <label for="password">Mot de passe</label>
      <input id="password" type="password" formControlName="password" />
      <p class="error" *ngIf="loginForm.controls.password.touched && loginForm.controls.password.invalid">
        Le mot de passe est requis (8 caracteres minimum).
      </p>

      <app-button class="login-submit" type="submit" [disabled]="loading">
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </app-button>
    </form>

    <p class="feedback success" *ngIf="successMessage">{{ successMessage }}</p>
    <p class="feedback error" *ngIf="errorMessage">{{ errorMessage }}</p>
  </div>
</div>
